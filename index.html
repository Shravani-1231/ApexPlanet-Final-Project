<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Smart Task Manager Pro</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- LOGIN PAGE -->

    <div id="loginPage" class="login-box">

        <h2>🔐 Login</h2>

        <input type="text"
               id="username"
               placeholder="Enter Username">

        <input type="password"
               id="password"
               placeholder="Enter Password">

        <button onclick="login()">
            Login
        </button>

    </div>


    <!-- MAIN APP -->

    <div class="container"
         id="mainApp"
         style="display:none;">

        <h1>✨ Smart Task Manager Pro</h1>

        <button class="dark-btn"
                onclick="toggleDarkMode()">

            🌙 Dark Mode

        </button>


        <!-- INPUT SECTION -->

        <div class="input-section">

            <input type="text"
                   id="taskInput"
                   placeholder="Enter Task">

            <input type="date"
                   id="dateInput">

            <select id="priorityInput">

                <option value="High">
                    High Priority
                </option>

                <option value="Medium">
                    Medium Priority
                </option>

                <option value="Low">
                    Low Priority
                </option>

            </select>

            <button onclick="addTask()">
                Add Task
            </button>

        </div>


        <!-- SEARCH -->

        <input type="text"
               id="searchInput"
               placeholder="🔍 Search Task"
               onkeyup="searchTask()">



        <!-- FILTER BUTTONS -->

        <div class="filter-buttons">

            <button onclick="filterTasks('all')">
                All
            </button>

            <button onclick="filterTasks('completed')">
                Completed
            </button>

            <button onclick="filterTasks('pending')">
                Pending
            </button>

        </div>


        <!-- TASK COUNT -->

        <h3 id="taskCount"></h3>


        <!-- PROGRESS BAR -->

        <div class="progress-container">

            <div class="progress-bar"
                 id="progressBar">

            </div>

        </div>


        <!-- TASK LIST -->

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
